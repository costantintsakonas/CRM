{% extends 'base_employee.html' %}

{% block title %}Edit Customer{% endblock %}

{% block content %}

<h1>Edit Customer</h1>

<form method="post">
    
    <input type="text" name="first_name" placeholder="Name" value="{{ customer['first_name'] }}" required /> (Name)(*)
    <br>
   
    <input type="text" name="last_name" placeholder="Surname" value="{{ customer['last_name'] }}" required /> (Surname)(*)
    <br>
  
    <input type="email" name="email" placeholder="E Mail" value="{{ customer['email'] }}" required /> (Email)(*) <br>
    <input type="text" name="phone" placeholder="Phone" value="{{ customer['phone'] }}" /> (Phone) <br>
    <input type="text" name="company" placeholder="Company" value="{{ customer['company'] }}" /> (Company) <br>
    <input type="text" name="address" placeholder="Address" value="{{ customer['address'] }}" /> (Address) <br>
    <select id="status" name="status"> 
        <option value="lead" selected>Lead</option>
        <option value="active">Active</option>
        <option value="inactive">Inctive</option>
        <option value="cancelled">Cancelled</option>
    </select> (Status)<br> <br>
    <button type="submit">Submit</button><br>
    (*) Required Fiels
</form>

{% endblock %}
