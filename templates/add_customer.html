{% extends 'base_employee.html' %}

{% block title %}Add Customer{% endblock %}

{% block content %}

<h1>Add Customer</h1>

<form method="post">
    <input type="text" name="first_name" placeholder="Name" required/>(*) <br>
    <input type="text" name="last_name" placeholder="Surname" required/>(*)  <br>
    <input type="email" name="email" placeholder="E Mail" required/>(*) <br> 
    <input type="text" name="phone" placeholder="Phone" /> <br>
    <input type="text" name="company" placeholder="Company" /> <br>
    <input type="text" name="address" placeholder="Address" /> <br>
    <select id="status" name="status">
        <option value="lead" selected>Lead</option>
        <option value="active">Active</option>
        <option value="inactive">Inctive</option>
        <option value="cancelled">Cancelled</option>
    </select><br> <br>
    <button type="submit">Submit</button><br>
    (*) Required Fiels
</form>

{% endblock %}
